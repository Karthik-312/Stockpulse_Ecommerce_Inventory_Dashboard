server:
  port: 9090

spring:
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  datasource:
    url: jdbc:h2:mem:ecommercedb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

stockpulse:
  api:
    base-url: http://localhost:8080

jwt:
  secret: stockpulse-ecommerce-jwt-secret-key-that-is-at-least-256-bits-long-for-hs256
  expiration: 86400000
